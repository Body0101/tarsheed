<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - الصفحة غير موجودة</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: white;
            font-family: 'Arial Black', sans-serif;
        }

        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* نص 404 */
        #text-404 {
            font-size: 150px;
            font-weight: bold;
            color: #333;
            position: absolute;
            z-index: 1;
            transition: opacity 0.1s;
        }

        /* الصاروخ */
        #rocket {
            position: absolute;
            font-size: 50px;
            top: -100px;
            right: -100px;
            z-index: 10;
            transition: none;
            pointer-events: none;
        }

        /* تأثير الانفجار البسيط */
        .explosion {
            position: absolute;
            width: 10px;
            height: 10px;
            background: orange;
            border-radius: 50%;
            opacity: 0;
            z-index: 5;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .message {
            position: absolute;
            bottom: 20%;
            font-size: 20px;
            color: #888;
            opacity: 0;
            transition: opacity 2s;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="container">
        <div id="text-404">404</div>
        <div id="rocket">🚀</div>
        <div class="message" id="msg">عذراً، هذه الصفحة احترقت وتلاشت!</div>
        <canvas id="ashCanvas"></canvas>
    </div>

    <script>
        const rocket = document.getElementById('rocket');
        const text = document.getElementById('text-404');
        const canvas = document.getElementById('ashCanvas');
        const ctx = canvas.getContext('2d');
        const msg = document.getElementById('msg');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        let animationId;
        let isBlown = false;

        // إعدادات الصاروخ
        const startX = window.innerWidth + 100;
        const startY = -100;
        const targetX = window.innerWidth / 2;
        const targetY = window.innerHeight / 2;

        function moveRocket() {
            let currentX = startX;
            let currentY = startY;
            
            const interval = setInterval(() => {
                currentX -= (currentX - targetX) * 0.1;
                currentY += (targetY - currentY) * 0.1;
                
                rocket.style.left = currentX + 'px';
                rocket.style.top = currentY + 'px';
                rocket.style.transform = `rotate(${-Math.atan2(targetY - startY, targetX - startX) * 180 / Math.PI}deg)`;

                // عند وصول الصاروخ للنص
                if (Math.abs(currentX - targetX) < 20 && Math.abs(currentY - targetY) < 20) {
                    clearInterval(interval);
                    explode();
                }
            }, 20);
        }

        function explode() {
            rocket.style.display = 'none';
            text.style.opacity = '0'; // إخفاء النص الأصلي
            
            // تحويل النص إلى جزيئات (رماد)
            createAsh();
            animateAsh();
            
            // إظهار رسالة بعد فترة
            setTimeout(() => {
                msg.style.opacity = '1';
            }, 2000);

            // بدء الرياح بعد ثانية من الانفجار
            setTimeout(() => {
                isBlown = true;
            }, 1500);
        }

        function createAsh() {
            // سنقوم بإنشاء نقاط في شكل تقريبي للنص 404
            const fontSize = 150;
            const centerX = window.innerWidth / 2;
            const centerY = window.innerHeight / 2;

            // توليد نقاط عشوائية في منطقة النص لمحاكاة الرماد
            for (let i = 0; i < 800; i++) {
                particles.push({
                    x: centerX + (Math.random() - 0.5) * 300,
                    y: centerY + (Math.random() - 0.5) * 150,
                    size: Math.random() * 3 + 1,
                    speedX: (Math.random() - 0.5) * 2,
                    speedY: (Math.random() - 0.5) * 2,
                    color: `rgba(${100 + Math.random()*50}, ${100 + Math.random()*50}, ${100 + Math.random()*50}, ${Math.random()})`,
                    life: Math.random() * 100 + 50
                });
            }
        }

        function animateAsh() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            particles.forEach((p, index) => {
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();

                // حركة الجزيئات
                p.x += p.speedX;
                p.y += p.speedY;

                // تأثير الرياح (سحب الرماد لليمين)
                if (isBlown) {
                    p.x += 5; // سرعة الرياح
                    p.y += (Math.random() - 0.5) * 2; // تذبذب الهواء
                }

                // تلاشي الرماد
                p.life -= 0.5;
                if (p.life <= 0) {
                    particles.splice(index, 1);
                }
            });

            animationId = requestAnimationFrame(animateAsh);
        }

        // بدء الحركة عند تحميل الصفحة
        window.onload = () => {
            setTimeout(moveRocket, 1000);
        };

        // إعادة ضبط الحجم عند تغيير نافذة المتصفح
        window.onresize = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        };

    </script>
</body>
</html>
